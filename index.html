<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f5f4f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:#1a1a18}
.app{display:flex;flex-direction:column;height:100vh;background:#fff;border-left:0.5px solid #d3d1c7;border-right:0.5px solid #d3d1c7;max-width:1400px;margin:0 auto}
/* Topbar */
.topbar{display:flex;align-items:flex-end;padding:0 16px 0;height:46px;background:#f5f4f0;position:relative;flex-shrink:0}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:0.5px;background:#d3d1c7;z-index:1}
.tb-left{display:flex;align-items:center;padding-bottom:8px;flex-shrink:0;margin-right:10px}
.tb-title-bold{font-size:13px;font-weight:700;color:#1a1a18;letter-spacing:0.04em;white-space:nowrap}
.tb-title-light{font-size:13px;font-weight:400;color:#888780;margin-left:5px;white-space:nowrap}
.tb-nav{display:flex;gap:2px;align-items:flex-end}
.tb-tab{height:33px;padding:0 12px;display:flex;align-items:center;gap:6px;border-radius:6px 6px 0 0;border:0.5px solid #c9c7be;background:#e2e0da;color:#888780;font-size:10.5px;cursor:pointer;position:relative;bottom:-0.5px;z-index:0;transition:all 0.12s;white-space:nowrap;font-family:inherit;letter-spacing:0.03em;outline:none}
.tb-tab:hover{background:#d6d4cd;color:#1a1a18}
.tb-tab.act{background:#fff;color:#534AB7;border-bottom-color:#fff;z-index:2}
.tb-tab svg{width:13px;height:13px;flex-shrink:0}
.tb-right{display:flex;align-items:center;gap:8px;padding-bottom:8px;margin-left:auto;flex-shrink:0}
.tb-sync{font-size:10px;color:#534AB7;border:0.5px solid #534AB7;border-radius:6px;padding:4px 9px;cursor:pointer;background:#fff;transition:background 0.12s;white-space:nowrap}
.tb-sync:hover{background:#f0eeff}
.tb-icon-btn{background:none;border:none;cursor:pointer;color:#888780;padding:4px;border-radius:6px;display:flex;align-items:center;transition:all 0.12s}
.tb-icon-btn:hover{color:#534AB7;background:rgba(83,74,183,0.08)}
.tb-icon-btn svg{width:17px;height:17px}
.tb-user-btn{background:none;border:none;cursor:pointer;color:#888780;padding:4px 8px;border-radius:6px;display:flex;align-items:center;gap:6px;transition:all 0.12s;font-family:inherit}
.tb-user-btn:hover{color:#534AB7;background:rgba(83,74,183,0.08)}
.tb-user-btn svg{width:17px;height:17px}
.tb-uname{font-size:11px;color:#1a1a18;letter-spacing:0.02em}
.tb-user-btn:hover .tb-uname{color:#534AB7}
/* Body */
.body{display:flex;flex:1;overflow:hidden;min-height:0;position:relative}
/* Sidebar */
.sidebar{width:190px;flex-shrink:0;background:#f5f4f0;border-right:0.5px solid #d3d1c7;display:flex;flex-direction:column;overflow:hidden;transition:width 0.2s}
.sb-hamburger{display:none;align-items:center;justify-content:center;height:44px;cursor:pointer;color:#888780;flex-shrink:0;border-bottom:0.5px solid #d3d1c7;transition:color 0.12s}
.sb-hamburger:hover{color:#534AB7}
.sb-content{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.sb-top-nav{padding:4px 0;border-bottom:0.5px solid #d3d1c7;flex-shrink:0}
.sb-top-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;transition:background 0.1s;border-left:2px solid transparent}
.sb-top-item:hover{background:#ebebea}
.sb-top-item.act{background:#fff;border-left-color:#534AB7}
.sb-top-item.act .sb-top-nm{color:#534AB7;font-weight:500}
.sb-top-item.act .sb-top-ic{color:#534AB7}
.sb-top-ic{width:14px;height:14px;flex-shrink:0;color:#888780}
.sb-top-nm{font-size:11px;color:#1a1a18;white-space:nowrap;overflow:hidden}
.sb-badge{font-size:9px;background:#534AB7;color:#fff;border-radius:10px;padding:1px 6px;flex-shrink:0;margin-left:auto}
.sb-head{padding:10px 14px 6px;flex-shrink:0}
.sb-sec{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#888780}
.sb-list{flex:1;overflow-y:auto;padding:4px 0}
.sb-item{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-left:2px solid transparent;cursor:pointer;transition:background 0.1s}
.sb-item:hover{background:#ebebea}
.sb-item.act{background:#fff;border-left-color:#534AB7}
.sb-item.act .sb-nm{font-weight:500;color:#534AB7}
.sb-nm{font-size:11px;color:#1a1a18;letter-spacing:0.04em}
.sb-cnt{font-size:9px;background:#e8e6e0;color:#888780;border-radius:10px;padding:1px 6px;flex-shrink:0}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:50}
.sb-overlay.vis{display:block}
/* Main */
.main{flex:1;min-width:0;background:#fff;overflow-y:auto;display:flex;flex-direction:column}
.mhead{padding:12px 16px 10px;border-bottom:0.5px solid #d3d1c7;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.mh-title{font-size:17px;font-weight:500;letter-spacing:0.03em}
.mh-sub{font-size:11px;color:#888780;margin-top:2px}
.mh-left{display:flex;align-items:center;gap:14px;min-width:0;flex:1;flex-wrap:wrap}
.cref-strip{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.cref-thumb{width:72px;height:72px;border-radius:6px;overflow:hidden;background:#e8e6dd;cursor:pointer;flex-shrink:0;position:relative;border:0.5px solid #d3d1c7;transition:transform 0.12s}
.cref-thumb:hover{transform:scale(1.04)}
.cref-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.cref-del{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,0.55);color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;padding:0;font-size:11px}
.cref-thumb:hover .cref-del{display:flex}
.cref-del:hover{background:rgba(192,57,43,0.9)}
.cref-add{width:72px;height:72px;border-radius:6px;border:1px dashed #b4b2a9;background:transparent;color:#888780;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:9px;font-family:inherit;flex-shrink:0;transition:all 0.12s}
.cref-add:hover{border-color:#534AB7;color:#534AB7;background:#f0effe}
.cref-add svg{width:16px;height:16px}
.cref-add-busy{opacity:0.5;cursor:wait}
.mh-right{display:flex;gap:6px;flex-shrink:0;align-items:center;flex-wrap:wrap}
.fl{font-size:9px;letter-spacing:0.05em;text-transform:uppercase;padding:4px 10px;border-radius:20px;border:0.5px solid #d3d1c7;color:#888780;cursor:pointer;background:none;font-family:inherit;transition:all 0.12s}
.fl:hover{border-color:#888780;color:#1a1a18}
.fl.act{background:#534AB7;border-color:#534AB7;color:#fff}
.new-bar{margin:10px 14px 0;background:#EAF3DE;border:0.5px solid #97C459;border-radius:8px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.nb-l{display:flex;align-items:center;gap:8px}
.nb-dot{width:6px;height:6px;border-radius:50%;background:#3B6D11;flex-shrink:0}
.nb-txt{font-size:11px;color:#3B6D11;font-weight:500}
.nb-btn{font-size:10px;font-weight:500;color:#3B6D11;border:0.5px solid #3B6D11;border-radius:6px;padding:4px 10px;cursor:pointer;background:none;font-family:inherit;white-space:nowrap;transition:background 0.12s}
.nb-btn:hover{background:rgba(59,109,17,0.08)}
.sec-lbl{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#888780;padding:11px 14px 4px}
/* Grids */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:9px;padding:0 14px 14px}
.grid-sm{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:8px;padding:0 0 14px}
.card{border-radius:8px;overflow:hidden;border:0.5px solid #d3d1c7;position:relative;cursor:pointer;transition:border-color 0.12s,box-shadow 0.12s}
.card:hover{border-color:#b4b2a9;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.card.sel{border-color:#534AB7;border-width:1.5px}
.card.isnew{border-color:#97C459}
.card-photo{width:100%;aspect-ratio:3/4;object-fit:cover;display:block}
.card-ph{width:100%;aspect-ratio:3/4;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-size:11px;font-weight:500;color:rgba(255,255,255,0.7)}
.card-name{padding:5px 8px 6px;font-size:11px;font-weight:500;background:#f5f4f0;color:#1a1a18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{position:absolute;top:6px;left:6px;font-size:8px;font-weight:600;letter-spacing:0.05em;padding:2px 6px;border-radius:3px}
.b-t{background:#3B6D11;color:#C0DD97}
.b-m{background:#854F0B;color:#FAC775}
.cmt-dot{position:absolute;top:6px;right:6px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:7px;color:#fff;font-weight:600}
.new-tag{position:absolute;bottom:26px;right:6px;font-size:8px;background:#EAF3DE;color:#3B6D11;border-radius:3px;padding:1px 5px;font-weight:500}
/* Overview */
.ov-wrap{padding:14px}
.ov-char-lbl{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#888780;padding:10px 0 6px}
.ov-empty{font-size:11px;color:#b4b2a9;font-style:italic;padding:6px 0 14px}
.ov-row-txt{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#fff;border:0.5px solid #d3d1c7;border-radius:8px;margin-bottom:6px;cursor:pointer;transition:border-color 0.12s}
.ov-row-txt:hover{border-color:#b4b2a9}
.ov-char{font-size:11px;font-weight:500;letter-spacing:0.04em;width:130px;flex-shrink:0}
.ov-stat{font-size:11px;color:#888780}
/* Pranešimai */
.notif-item{background:#fff;border:0.5px solid #d3d1c7;border-radius:8px;padding:10px 12px;margin-bottom:5px;display:flex;gap:10px;align-items:flex-start;transition:opacity 0.25s,max-height 0.3s,padding 0.3s,margin 0.3s,border-color 0.12s;cursor:pointer;overflow:hidden;max-height:200px}
.notif-item:hover{border-color:#b4b2a9}
.notif-item.removing{opacity:0;max-height:0;padding-top:0;padding-bottom:0;margin-bottom:0;border-width:0}
.notif-ic{width:30px;height:30px;border-radius:50%;background:#f0eeff;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.notif-ic svg{width:13px;height:13px;color:#534AB7}
.notif-ic.has-photo{width:48px;height:64px;border-radius:6px;background:#e8e6dd;overflow:hidden;margin-top:0}
.notif-ic.has-photo img{width:100%;height:100%;object-fit:cover;display:block}
.notif-body{flex:1;min-width:0}
.notif-txt{font-size:11px;color:#1a1a18;line-height:1.5;margin-bottom:3px}
.notif-txt a{color:#534AB7;cursor:pointer;text-decoration:none}
.notif-txt a:hover{text-decoration:underline}
.notif-time{font-size:10px;color:#888780}
.notif-mark{font-size:9px;color:#888780;border:0.5px solid #d3d1c7;border-radius:4px;padding:2px 8px;cursor:pointer;background:none;font-family:inherit;transition:all 0.12s;white-space:nowrap;flex-shrink:0;align-self:flex-start;margin-top:2px}
.notif-mark:hover{border-color:#888780;color:#1a1a18}
/* Nauji kandidatai */
.nauji-char-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0 6px;border-bottom:0.5px solid #e8e6e0;margin-bottom:8px;cursor:pointer}
.nauji-char-nm{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#1a1a18}
.nauji-cnt{font-size:9px;background:#EAF3DE;color:#3B6D11;border-radius:10px;padding:1px 7px}
/* Panel */
.panel{width:400px;flex-shrink:0;background:#f5f4f0;border-left:0.5px solid #d3d1c7;display:flex;flex-direction:column;overflow:hidden;transition:width 0.18s}
.panel.hidden{width:0;border:none}
.panel-inner{overflow-y:auto;flex:1}
.panel-head{padding:12px 14px 10px;background:#fff;border-bottom:0.5px solid #d3d1c7;position:sticky;top:0;z-index:2}
.ph-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ph-name{font-size:17px;font-weight:500}
.ph-id{font-size:10px;color:#888780;margin-top:2px}
.ph-close{background:none;border:none;cursor:pointer;color:#888780;font-size:16px;padding:2px 6px;line-height:1;transition:color 0.1s;flex-shrink:0}
.ph-close:hover{color:#1a1a18}
.ph-addbtn{display:inline-block;font-size:10px;color:#534AB7;border:0.5px solid #534AB7;border-radius:6px;padding:4px 9px;cursor:pointer;background:#fff;margin-top:8px;transition:background 0.12s}
.ph-addbtn:hover{background:#f0eeff}
.pb{padding:12px 14px}
.photo-main{width:100%;aspect-ratio:3/4;border-radius:8px;object-fit:cover;display:block;margin-bottom:7px;cursor:pointer;transition:opacity 0.12s}
.photo-main:hover{opacity:0.9}
.photo-main-ph{width:100%;aspect-ratio:3/4;border-radius:8px;display:block;margin-bottom:7px}
.pgrid{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:10px}
.pgrid-cell{width:calc(20% - 3px);aspect-ratio:3/4;border-radius:4px;object-fit:cover;display:block;cursor:pointer;transition:opacity 0.12s;background:#d3d1c7}
.pgrid-cell:hover{opacity:0.78}
.vgrid{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:12px}
.vthumb{width:calc(25% - 3px);aspect-ratio:16/9;border-radius:4px;background:#2c2c2a;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;text-decoration:none;overflow:hidden;transition:opacity 0.12s}
.vthumb:hover{opacity:0.82}
.vthumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.vplay{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.88);display:flex;align-items:center;justify-content:center;font-size:6px;color:#1a1a18;position:relative;z-index:1}
.vsrc{position:absolute;bottom:2px;right:3px;font-size:6px;color:rgba(255,255,255,0.6);z-index:1}
.psec{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#888780;margin:0 0 7px}
.cvrow{display:flex;padding:5px 0;border-bottom:0.5px solid #d3d1c7}
.cvl{width:98px;flex-shrink:0;font-size:10px;color:#888780;text-transform:uppercase;letter-spacing:0.04em;padding-top:1px}
.cvv{font-size:11px;color:#1a1a18;line-height:1.4}
.divider{border:none;border-top:0.5px solid #d3d1c7;margin:12px 0}
.info-display{background:transparent;border:none;border-bottom:0.5px solid #d3d1c7;padding:5px 0 8px;font-size:11px;color:#1a1a18;min-height:auto;margin-bottom:10px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.info-display.empty{color:#b4b2a9;font-style:italic}
.stbtns{display:flex;gap:6px;margin-bottom:4px}
.stb{flex:1;padding:8px 4px;border-radius:6px;font-size:9px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;text-align:center;border:0.5px solid #d3d1c7;color:#888780;cursor:pointer;background:none;font-family:inherit;transition:all 0.12s;outline:none}
.stb:hover{border-color:#888780;color:#1a1a18}
.stb.s-t{background:#EAF3DE;border-color:#3B6D11;color:#3B6D11}
.stb.s-m{background:#FAEEDA;border-color:#854F0B;color:#854F0B}
.cmt-item{background:#fff;border-left:2px solid #d3d1c7;border-radius:0 6px 6px 0;padding:7px 9px;margin-bottom:5px;position:relative}
.cmt-author{font-size:10px;color:#534AB7;font-weight:500}
.cmt-time{font-size:9px;color:#888780;float:right;margin-right:18px}
.cmt-text{font-size:11px;color:#1a1a18;margin-top:2px;line-height:1.45;clear:both}
.cmt-att-link{display:flex;align-items:center;gap:5px;margin-top:5px;font-size:10px}
.cmt-att-link a{color:#534AB7;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmt-att-link a:hover{text-decoration:underline}
.cmt-att-img{margin-top:6px}
.cmt-att-img img{max-width:140px;max-height:180px;border-radius:5px;display:block;cursor:pointer;border:0.5px solid #d3d1c7;transition:opacity 0.12s}

.cmt-del{position:absolute;top:5px;right:5px;background:none;border:none;cursor:pointer;color:#b4b2a9;padding:3px;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:all 0.12s}

.cmt-compose{position:sticky;bottom:0;background:#f5f4f0;margin:8px -14px -12px -14px;padding:8px 14px 12px;border-top:0.5px solid #d3d1c7;z-index:3}
.cmt-row{display:flex;gap:5px;align-items:flex-end}
.cmt-inp{flex:1;font-size:11px;background:#fff;border:0.5px solid #d3d1c7;border-radius:6px;padding:6px 8px;color:#1a1a18;font-family:inherit;outline:none;transition:border-color 0.12s;resize:none;line-height:1.45;min-height:34px;max-height:90px;overflow-y:auto}
.cmt-inp:focus{border-color:#534AB7}
.cmt-clip{background:none;border:0.5px solid #d3d1c7;border-radius:6px;padding:0 7px;cursor:pointer;color:#888780;display:flex;align-items:center;height:34px;transition:all 0.12s;flex-shrink:0;position:relative;overflow:hidden}
.cmt-clip:hover{border-color:#534AB7;color:#534AB7}
.cmt-clip svg{width:14px;height:14px;pointer-events:none}
.cmt-clip input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0;width:100%}
.cmt-send{font-size:10px;font-weight:500;padding:0 11px;border-radius:6px;background:#534AB7;color:#fff;border:none;cursor:pointer;font-family:inherit;transition:background 0.12s;white-space:nowrap;flex-shrink:0;height:34px}
.cmt-send:hover{background:#3c349e}
.cmt-send:disabled{background:#b4b2a9;cursor:not-allowed}
.cmt-pending{display:flex;align-items:center;gap:5px;font-size:10px;color:#888780;padding:4px 0;margin-top:3px}
.cmt-pending span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:170px}
.cmt-pending .rm{cursor:pointer;color:#c0392b;border:none;background:none;font-size:12px;padding:0;line-height:1}
/* Gallery */
.gallery{position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:300;display:flex;align-items:center;justify-content:center}
.gal-img{max-height:90vh;max-width:90vw;object-fit:contain;border-radius:3px;display:block;user-select:none}

.modal-ta:focus{border-color:#534AB7;background:#fff}
.modal-inp{width:100%;background:#f5f4f0;border:0.5px solid #d3d1c7;border-radius:6px;padding:8px 10px;font-size:11px;font-family:inherit;color:#1a1a18;outline:none;transition:border-color 0.12s;margin-bottom:0}
.modal-inp:focus{border-color:#534AB7;background:#fff}
.vid-prev{margin-top:8px;border-radius:6px;overflow:hidden;background:#2c2c2a;position:relative;aspect-ratio:16/9;display:none}
.vid-prev img{width:100%;height:100%;object-fit:cover}
.vid-prev-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.vid-prev-play span{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.88);display:flex;align-items:center;justify-content:center;font-size:9px}
.modal-btns{display:flex;gap:8px;margin-top:18px}
.btn-save{flex:1;padding:9px;background:#534AB7;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:background 0.12s}
.btn-save:hover{background:#3c349e}
.btn-cancel{flex:1;padding:9px;background:none;color:#888780;border:0.5px solid #d3d1c7;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.12s}
.btn-cancel:hover{border-color:#888780;color:#1a1a18}

.us-email{font-size:11px;color:#534AB7;margin-bottom:14px;font-weight:500}

.us-check input,.us-radio input{accent-color:#534AB7;cursor:pointer}

.invalid-box p{font-size:12px;color:#888780;line-height:1.6}

.admin-panel{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:250;display:flex;align-items:center;justify-content:center;padding:20px}

.link-btn{font-size:10px;color:#534AB7;border:0.5px solid #534AB7;border-radius:5px;padding:4px 8px;cursor:pointer;background:none;font-family:inherit;transition:background 0.12s;white-space:nowrap}
.link-btn:hover{background:#f0eeff}
.del-btn{font-size:10px;color:#c0392b;border:0.5px solid #c0392b;border-radius:5px;padding:4px 8px;cursor:pointer;background:none;font-family:inherit;transition:background 0.12s;white-space:nowrap}
.del-btn:hover{background:#fff1f0}
.add-user-form{background:#f5f4f0;border-radius:8px;padding:14px;margin-bottom:16px}
.add-user-form .row{display:flex;gap:8px;margin-bottom:8px}
.add-user-form input{flex:1;background:#fff;border:0.5px solid #d3d1c7;border-radius:6px;padding:7px 9px;font-size:11px;font-family:inherit;color:#1a1a18;outline:none;transition:border-color 0.12s}
.add-user-form input:focus{border-color:#534AB7}
/* Utils */
.loading{display:flex;align-items:center;justify-content:center;padding:60px 20px;color:#888780;font-size:12px;gap:8px}
.spinner{width:16px;height:16px;border:2px solid #d3d1c7;border-top-color:#534AB7;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:#888780;font-size:12px}
::-webkit-scrollbar{width:4px;height:4px}

.toast{position:fixed;bottom:20px;right:20px;background:#2c2c2a;color:#f5f4f0;font-size:11px;padding:9px 16px;border-radius:8px;z-index:999;opacity:0;transition:opacity 0.2s;pointer-events:none}

// ── Supabase ───────────────────────────────────────────────────────────────
async function sb(path, opts) {
  opts = opts || {};
  var r = await fetch(SUPABASE_URL + path, Object.assign({}, opts, {
    headers: Object.assign({
      'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json', 'Prefer': 'return=representation'
    }, opts.headers || {})
  }));
  if (!r.ok) { var t = await r.text(); throw new Error(t); }
  return r.json().catch(function(){ return {}; });
}
function pUrl(p) { return p ? PHOTO_BASE + p : null; }

// ── Init — token from URL ──────────────────────────────────────────────────
window.onload = async function() {
  var params = new URLSearchParams(window.location.search);
  var token  = params.get('t');
  if (!token) { showInvalid('Nuoroda neturi prieigos rakto.<br>Paprašykite administratoriaus atsiųsti jūsų asmeninę nuorodą.'); return; }
  try {
    var users = await sb('/rest/v1/app_users?token=eq.' + encodeURIComponent(token) + '&select=id,name,email,token,pref_actors,pref_comments,pref_info,pref_videos,pref_status,frequency');
    if (!Array.isArray(users) || !users.length) { showInvalid('Nuoroda neatpažinta.<br>Paprašykite administratoriaus atsiųsti naują nuorodą.'); return; }
    var u = users[0];
    S.username  = u.name;
    S.userEmail = u.email || '';
    S.userId    = u.id;
    S.userToken = u.token;
    startApp();
  } catch(e) {
    showInvalid('Nepavyko prisijungti. Patikrinkite interneto ryšį.<br><small>' + e.message + '</small>');
  }
};

function showInvalid(msg) {
  document.body.innerHTML = '<div class="invalid-screen"><div class="invalid-box">'
    + '<h2>Prieiga negalima</h2><p style="margin-top:8px">' + msg + '</p></div></div>';
}

function startApp() {
  document.getElementById('appShell').style.display = 'flex';
  var nameEl = document.getElementById('tbUserName');
  if (nameEl) nameEl.textContent = S.username || '';
  loadData();
  startRealtime();
}

// ── Load data ──────────────────────────────────────────────────────────────
async function loadData() {
  // Preserve current view state so Atnaujinti reloads what the user was looking at,
  // not always Pranešimai. Previously switchView() only handled 2 views and reset
  // activeBasketId, which made the refresh button effectively a "go home" button.
  var prevView   = S.view;
  var prevBaId   = S.activeBasketId;
  var prevSelBa  = S.selectedBaId;
  setSyncTxt('↻ Kraunama…');
  try {
    var projs = await sb('/rest/v1/projects?select=id,name&order=created_at.desc&limit=1');
    if (!projs.length) {
      document.getElementById('mainArea').innerHTML = '<div class="empty-state">Projekto duomenų nerasta.<br>Paleiskite sinchronizaciją iš naršyklės plėtinio.</div>';
      setSyncTxt('↻ Atnaujinti'); return;
    }
    S.projectId = projs[0].id;
    S.baskets = await sb('/rest/v1/baskets?project_id=eq.' + S.projectId + '&select=id,name,basket_date,actor_count&order=basket_date.asc,name.asc');
    renderSidebar();
    updateBadges();
    // Route to the view the user had open
    if (prevView === 'basket' && prevBaId && S.baskets.some(function(b){ return b.id === prevBaId; })) {
      S.selectedBaId = prevSelBa;
      await selectBasket(prevBaId);
    } else if (prevView === 'patvirtinti' || prevView === 'galbut' || prevView === 'nepatvirtinti') {
      var tabId = prevView === 'patvirtinti' ? 'tabPatv' : prevView === 'galbut' ? 'tabGalb' : 'tabNepa';
      showOverview(prevView, document.getElementById(tabId));
    } else if (prevView === 'nauji') {
      switchView('nauji');
    } else {
      switchView('pranesimai');
    }
    setSyncTxt('↻ Atnaujinti');
  } catch(e) { setSyncTxt('⚠ Klaida'); showToast('Klaida: ' + e.message); }
}
function setSyncTxt(t) { document.getElementById('syncBtn').textContent = t; }

// ── Sidebar ────────────────────────────────────────────────────────────────
function renderSidebar() {
  var list = document.getElementById('sidebarList');
  if (!S.baskets.length) { list.innerHTML = '<div style="padding:14px;font-size:11px;color:#888780">Veikėjų nerasta</div>'; return; }
  list.innerHTML = S.baskets.map(function(b) {
    return '<div class="sb-item ' + (b.id === S.activeBasketId && S.view === 'basket' ? 'act' : '') + '" onclick="selectBasket(\'' + b.id + '\')">'
      + '<span class="sb-nm">' + b.name.toUpperCase() + '</span>'
      + '<span class="sb-cnt">' + (b.actor_count || 0) + '</span></div>';
  }).join('');
  document.getElementById('sbPran').classList.toggle('act',  S.view === 'pranesimai');
  document.getElementById('sbNauji').classList.toggle('act', S.view === 'nauji');
}

async function updateBadges() {
  if (!S.projectId) return;
  try {
    var ns = await sb('/rest/v1/notifications?project_id=eq.' + S.projectId + '&select=id,read_by');
    var unread = ns.filter(function(n){ return !(n.read_by || []).includes(S.username); }).length;
    var b = document.getElementById('pranBadge');
    b.textContent = unread; b.style.display = unread ? '' : 'none';
  } catch(e) {}
  // Nauji kandidatai badge — count basket_actors not in seenActors set.
  // Always-visible badge, not just when the tab is open.
  try {
    if (!S.baskets || !S.baskets.length) return;
    var rows = await sb('/rest/v1/basket_actors?basket_id=in.(' + S.baskets.map(function(b){ return b.id; }).join(',') + ')&select=id');
    var newCount = rows.filter(function(r){ return !S.seenActors.has(r.id); }).length;
    var nb = document.getElementById('naukBadge');
    if (nb) { nb.textContent = newCount; nb.style.display = newCount ? '' : 'none'; }
  } catch(e) {}
}

// ── View switching ─────────────────────────────────────────────────────────
function switchView(view) {
  S.view = view; S.activeBasketId = null;
  document.querySelectorAll('.tb-tab').forEach(function(t){ t.classList.remove('act'); });
  closePanel(); renderSidebar();
  if      (view === 'pranesimai') loadPranesimai();
  else if (view === 'nauji')      loadNauji();
}

// ── Pranešimai ─────────────────────────────────────────────────────────────
async function loadPranesimai() {
  document.getElementById('mainArea').innerHTML = '<div class="loading"><div class="spinner"></div> Kraunama…</div>';
  var notifs = [];
  try { notifs = await sb('/rest/v1/notifications?project_id=eq.' + S.projectId + '&select=*&order=created_at.desc&limit=60'); } catch(e) {}
  // Hide already-read notifications entirely
  notifs = notifs.filter(function(n){ return !(n.read_by || []).includes(S.username); });
  // Resolve actor primary photo for any notification with basket_actor_id —
  // 2 bulk queries instead of N+1.
  var baIds = Array.from(new Set(notifs.map(function(n){ return n.basket_actor_id; }).filter(Boolean)));
  if (baIds.length) {
    try {
      var baRows = await sb('/rest/v1/basket_actors?id=in.(' + baIds.join(',') + ')&select=id,actor_id');
      var baToActor = {};
      baRows.forEach(function(r){ baToActor[r.id] = r.actor_id; });
      var actorIds = Array.from(new Set(Object.values(baToActor).filter(Boolean)));
      var photoMap = {};
      if (actorIds.length) {
        var phs = await sb('/rest/v1/actor_photos?actor_id=in.(' + actorIds.join(',') + ')&select=actor_id,storage_path,is_primary&order=is_primary.desc');
        phs.forEach(function(p){ if (!photoMap[p.actor_id]) photoMap[p.actor_id] = p.storage_path; });
      }
      notifs.forEach(function(n){
        if (n.basket_actor_id) {
          var aid = baToActor[n.basket_actor_id];
          if (aid && photoMap[aid]) n._photoPath = photoMap[aid];
        }
      });
    } catch(e) {}
  }
  // For new_char_refs, surface the most recent ref photo as preview
  var charRefBasketIds = Array.from(new Set(notifs.filter(function(n){ return n.type === 'new_char_refs' && n.basket_id; }).map(function(n){ return n.basket_id; })));
  if (charRefBasketIds.length) {
    try {
      var refs = await sb('/rest/v1/character_refs?basket_id=in.(' + charRefBasketIds.join(',') + ')&select=basket_id,storage_path&order=created_at.desc');
      var refMap = {};
      refs.forEach(function(r){ if (!refMap[r.basket_id]) refMap[r.basket_id] = r.storage_path; });
      notifs.forEach(function(n){
        if (n.type === 'new_char_refs' && n.basket_id && refMap[n.basket_id]) n._refPath = refMap[n.basket_id];
      });
    } catch(e) {}
  }
  S.notifications = notifs;
  renderPranesimai(notifs);
}

function renderPranesimai(notifs) {
  var unread = notifs.length;
  var html = '<div class="mhead"><div><div class="mh-title">Pranešimai</div><div class="mh-sub">'
    + (unread ? unread + ' neskaityta' : 'Visi perskaityti') + '</div></div>'
    + (unread ? '<button class="fl" onclick="markAllRead()">Žymėti visus kaip peržiūrėta</button>' : '')
    + '</div><div style="padding:10px 14px 14px" id="notifList">';
  if (!notifs.length) { html += '<div class="empty-state" style="padding:40px 0">Nėra naujų pranešimų</div>'; }
  else notifs.forEach(function(n) {
    html += notifHtml(n);
  });
  document.getElementById('mainArea').innerHTML = html + '</div>';
}

function notifHtml(n) {
  // Photo on the left if we have one (actor photo for candidate-related notifs,
  // first ref photo for new_char_refs). Falls back to type icon via helper
  // function (inline onerror with SVG strings breaks due to quote escaping).
  var icHtml;
  if (n._photoPath) {
    var url = PHOTO_BASE + n._photoPath;
    icHtml = '<div class="notif-ic has-photo" id="nic-' + n.id + '"><img src="' + esc(url) + '" alt="" onerror="notifIcFallback(\'' + n.id + '\',\'' + n.type + '\')"></div>';
  } else if (n._refPath) {
    var refUrl = REFS_BASE + n._refPath;
    icHtml = '<div class="notif-ic has-photo" id="nic-' + n.id + '"><img src="' + esc(refUrl) + '" alt="" onerror="notifIcFallback(\'' + n.id + '\',\'' + n.type + '\')"></div>';
  } else {
    icHtml = '<div class="notif-ic">' + nIcon(n.type) + '</div>';
  }
  return '<div class="notif-item" id="notif-' + n.id + '" onclick="onNotifClick(\'' + n.id + '\',event)">'
    + icHtml
    + '<div class="notif-body"><div class="notif-txt">' + nText(n) + '</div><div class="notif-time">' + timeAgo(n.created_at) + '</div></div>'
    + '<button class="notif-mark" onclick="event.stopPropagation();markRead(\'' + n.id + '\')">Peržiūrėta</button>'
    + '</div>';
}

function nText(n) {
  var a = esc(n.actor_name || ''), b = esc(n.basket_name || ''), by = esc(n.triggered_by || '');
  var loc = b ? ' (' + b + ')' : '';
  if (n.type === 'new_actors_batch') return 'Pridėti <strong>' + (n.count || '') + '</strong> nauji kandidatai';
  if (n.type === 'new_comment')  return '<strong>' + by + '</strong> pakomentuvo <strong>' + a + '</strong>' + loc;
  if (n.type === 'status_change') {
    var ns2 = (n.meta && n.meta.new_status === 'yes') ? 'Taip' : (n.meta && n.meta.new_status === 'maybe') ? 'Galbūt' : (n.meta && n.meta.new_status) || '';
    return 'Statusas pakeistas — <strong>' + a + '</strong>: ' + ns2 + loc;
  }
  if (n.type === 'info_update') return 'Atnaujinta informacija: <strong>' + a + '</strong>' + loc;
  if (n.type === 'new_video')   return 'Pridėtas naujas video: <strong>' + a + '</strong>' + loc;
  if (n.type === 'new_char_refs') return '<strong>' + by + '</strong> pridėjo <strong>' + (n.count || '') + '</strong> reference' + ((n.count||0) === 1 ? '' : 's') + ' veikėjui <strong>' + b + '</strong>';
  return (n.meta && n.meta.text) || 'Pranešimas';
}

// Click on notification body — open the relevant view, then mark read
async function onNotifClick(id, ev) {
  var n = (S.notifications || []).find(function(x){ return x.id === id; });
  if (!n) return;
  // Mark as read (server + local), then navigate
  await markRead(id, true);
  if (n.type === 'new_actors_batch') {
    switchView('nauji');
  } else if (n.type === 'new_char_refs' && n.basket_id) {
    selectBasket(n.basket_id);
  } else if (n.basket_actor_id && n.basket_id) {
    jumpToActor(n.basket_actor_id, n.basket_id);
  } else if (n.basket_id) {
    selectBasket(n.basket_id);
  }
}

async function markRead(id, silent) {
  try {
    var rows = await sb('/rest/v1/notifications?id=eq.' + id + '&select=read_by');
    var rb = (rows[0] && rows[0].read_by) ? rows[0].read_by.slice() : [];
    if (!rb.includes(S.username)) rb.push(S.username);
    await sb('/rest/v1/notifications?id=eq.' + id, { method: 'PATCH', body: JSON.stringify({ read_by: rb }) });
    var el = document.getElementById('notif-' + id);
    if (el) {
      el.classList.add('removing');
      setTimeout(function(){
        if (el && el.parentNode) el.parentNode.removeChild(el);
        // update header count if still on Pranešimai
        S.notifications = (S.notifications || []).filter(function(x){ return x.id !== id; });
        if (S.view === 'pranesimai') {
          var sub = document.querySelector('.mh-sub');
          if (sub) sub.textContent = S.notifications.length ? S.notifications.length + ' neskaityta' : 'Visi perskaityti';
          var list = document.getElementById('notifList');
          if (list && !list.querySelector('.notif-item')) {
            list.innerHTML = '<div class="empty-state" style="padding:40px 0">Nėra naujų pranešimų</div>';
          }
        }
      }, 280);
    }
    updateBadges();
  } catch(e) { if (!silent) showToast('Klaida'); }
}

async function markAllRead() {
  try {
    var ns = await sb('/rest/v1/notifications?project_id=eq.' + S.projectId + '&select=id,read_by');
    var unread = ns.filter(function(n){ return !(n.read_by || []).includes(S.username); });
    for (var i = 0; i < unread.length; i++) {
      var rb = ((unread[i].read_by) || []).concat([S.username]);
      await sb('/rest/v1/notifications?id=eq.' + unread[i].id, { method: 'PATCH', body: JSON.stringify({ read_by: rb }) });
    }
    loadPranesimai(); updateBadges();
  } catch(e) {}
}

async function createNotif(type, data) {
  if (!S.projectId) return;
  try {
    await sb('/rest/v1/notifications', { method: 'POST', body: JSON.stringify({
      project_id: S.projectId, type: type,
      basket_id: data.basketId || null, basket_actor_id: data.baId || null,
      actor_name: data.actorName || null, basket_name: data.basketName || null,
      count: data.count || 1, triggered_by: S.username, meta: data.meta || {}
    })});
    updateBadges();
  } catch(e) {}
}

async function loadNauji() {
  document.getElementById('mainArea').innerHTML = '<div class="loading"><div class="spinner"></div> Kraunama…</div>';
  if (!S.baskets.length) { document.getElementById('mainArea').innerHTML = '<div class="empty-state">Nėra duomenų</div>'; return; }
  try {
    // Fetch basket_actors with actor info — DO NOT embed actor_photos here

    var rows = await sb('/rest/v1/basket_actors?basket_id=in.(' + S.baskets.map(function(b){ return b.id; }).join(',') + ')&select=id,basket_id,status,actors(id,first_name,agency_id)');
    var newOnes = rows.filter(function(r){ return !S.seenActors.has(r.id); });
    // Fetch photos separately
    if (newOnes.length) {

        var photos = await sb('/rest/v1/actor_photos?actor_id=in.(' + actorIds.join(',') + ')&select=actor_id,storage_path,is_primary&order=is_primary.desc');

        photos.forEach(function(p){ if (!pMap[p.actor_id]) pMap[p.actor_id] = []; pMap[p.actor_id].push(p); });
        newOnes.forEach(function(r){ r._photos = (r.actors && pMap[r.actors.id]) || []; });

    badge.textContent = newOnes.length; badge.style.display = newOnes.length ? '' : 'none';

    document.getElementById('mainArea').innerHTML = '<div class="empty-state">Nepavyko užkrauti<br><small style="font-size:10px;color:#aaa;display:block;margin-top:6px">' + esc(e.message) + '</small></div>';
  }

function renderNauji(newOnes) {
  var html = '<div class="mhead"><div><div class="mh-title">Nauji kandidatai</div><div class="mh-sub">' + newOnes.length + ' neperžiūrėti</div></div>'
    + (newOnes.length ? '<button class="fl" onclick="markNaujiRead()">Žymėti kaip peržiūrėta</button>' : '') + '</div>';
  if (!newOnes.length) { html += '<div class="empty-state">Naujų kandidatų nėra</div>'; document.getElementById('mainArea').innerHTML = html; return; }
  S.baskets.forEach(function(basket) {
    var bNew = newOnes.filter(function(r){ return r.basket_id === basket.id; });
    if (!bNew.length) return;
    html += '<div style="padding:0 14px"><div class="nauji-char-row" onclick="selectBasket(\'' + basket.id + '\')">'
      + '<span class="nauji-char-nm">' + basket.name.toUpperCase() + '</span>'
      + '<span class="nauji-cnt">' + bNew.length + ' nauji</span></div></div><div class="grid" style="padding-top:0">';
    bNew.forEach(function(r) {
      var photos = r._photos || [];
      var name = (r.actors && r.actors.first_name) || '?';
      var agId = (r.actors && r.actors.agency_id) || 'x';
      var img = photoOrPlaceholder(photos, name, agId);
      var bst = r.status === 'yes' ? '<div class="badge b-t">Taip</div>' : r.status === 'maybe' ? '<div class="badge b-m">Galbūt</div>' : '';
      html += '<div class="card isnew" onclick="jumpToActor(\'' + r.id + '\',\'' + basket.id + '\')">' + img + bst + '<div class="card-name">' + esc(name) + '</div></div>';
    });
    html += '</div>';
  });
  document.getElementById('mainArea').innerHTML = html;
}

// Photo with cascading fallback. Takes the full photos array — if the primary
// fails to load, falls through to next, next, etc. Only after exhausting all
// photos does it show the colored placeholder. Avoids inline onerror with
// quote-laden HTML by using a registry + helper function.
var _photoCascades = {};

function photoOrPlaceholder(photos, name, agId, cls, clickAttr) {
  cls = cls || 'card-photo';
  var phCls = cls === 'photo-main' ? 'photo-main-ph' : 'card-ph';
  var phContent = cls === 'photo-main' ? '' : esc(name);
  // No photos at all → placeholder immediately
  if (!photos || !photos.length) {
    return '<div class="' + phCls + '" style="background:' + hsl(agId) + '">' + phContent + '</div>';
  }
  // Sort primary first
  var sorted = photos.slice().sort(function(a, b){ return (b.is_primary ? 1 : 0) - (a.is_primary ? 1 : 0); });
  var urls = sorted.map(function(p){ return pUrl(p.storage_path); }).filter(Boolean);
  if (!urls.length) {
    return '<div class="' + phCls + '" style="background:' + hsl(agId) + '">' + phContent + '</div>';
  }
  var id = 'ph-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7);
  _photoCascades[id] = { urls: urls, idx: 0, name: esc(name), bg: hsl(agId), cls: cls };
  return '<img class="' + cls + '" id="' + id + '" src="' + urls[0] + '" loading="lazy" alt="' + esc(name) + '"'
    + (clickAttr || '')
    + ' onerror="photoCascadeFail(\'' + id + '\')">';
}

// Walk to next photo URL on error; if exhausted, swap to colored placeholder.
function photoCascadeFail(id) {
  var img = document.getElementById(id);
  var ctx = _photoCascades[id];
  if (!img || !ctx) return;
  ctx.idx++;
  if (ctx.idx < ctx.urls.length) {
    img.src = ctx.urls[ctx.idx];
    return;
  }
  var phCls = ctx.cls === 'photo-main' ? 'photo-main-ph' : 'card-ph';
  var phContent = ctx.cls === 'photo-main' ? '' : ctx.name;
  img.outerHTML = '<div class="' + phCls + '" style="background:' + ctx.bg + '">' + phContent + '</div>';
  delete _photoCascades[id];
}

async function selectBasket(id) {

  document.querySelectorAll('.tb-tab').forEach(function(t){ t.classList.remove('act'); });
  closePanel(); renderSidebar(); closeSidebar();
  document.getElementById('mainArea').innerHTML = '<div class="loading"><div class="spinner"></div> Kraunama…</div>';
  try {
    var bas = await sb('/rest/v1/basket_actors?basket_id=eq.' + id + '&select=id,status,basket_id,actor_id,actors(id,agency_id,first_name,dob,height,weight,shoe_size,clothing_size,hair_color,eye_color,languages,skills),comments(id)');
    var ext = {};
    try {
      var extRows = await sb('/rest/v1/basket_actors?basket_id=eq.' + id + '&select=id,availability,notes,videos');
      extRows.forEach(function(r){ ext[r.id] = r; });
    } catch(e) {}

    var photos = [];

      return {
        basket_actor_id: ba.id, actor: ba.actors, status: ba.status || 'pending',
        comment_count: (ba.comments || []).length, is_new: !S.seenActors.has(ba.id),
        photos: photos.filter(function(p){ return p.actor_id === (ba.actors && ba.actors.id); }),
        availability: (ext[ba.id] && ext[ba.id].availability) || '',
        notes: (ext[ba.id] && ext[ba.id].notes) || '',
        videos: (ext[ba.id] && ext[ba.id].videos) || [],
      };
    });
    renderGrid();
  } catch(e) { document.getElementById('mainArea').innerHTML = '<div class="empty-state">Nepavyko užkrauti kandidatų</div>'; }
}

  var refsHtml = '<div class="cref-strip">';
  refs.forEach(function(r, i) {
    var url = REFS_BASE + r.storage_path;
    refsHtml += '<div class="cref-thumb" onclick="openRefGallery(' + i + ')">'
      + '<img src="' + esc(url) + '" alt="" onerror="this.style.display=\'none\'">'

      + '</div>';
  });

    + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>'
    + '<span>References</span></button>';

  refsHtml += '</div>';

  var html = '<div class="mhead"><div class="mh-left"><div><div class="mh-title">' + (basket ? esc(basket.name.toUpperCase()) : '') + '</div>'
    + '<div class="mh-sub">' + actors.length + ' kandidatai' + (refs.length ? ' · ' + refs.length + ' references' : '') + '</div></div>'
    + refsHtml + '</div>'
    + '<div class="mh-right">'
    + '<button class="fl ' + (f === 'all' ? 'act' : '') + '" onclick="setFilter(\'all\')">Visi</button>'
    + '<button class="fl ' + (f === 'taip' ? 'act' : '') + '" onclick="setFilter(\'taip\')">Taip</button>'
    + '<button class="fl ' + (f === 'galbut' ? 'act' : '') + '" onclick="setFilter(\'galbut\')">Galbūt</button>'
    + '</div></div>';
  if (newOnes.length && f === 'all') {
    html += '<div class="new-bar"><div class="nb-l"><div class="nb-dot"></div><div class="nb-txt">' + newOnes.length + ' naujai pridėti</div></div>'
      + '<button class="nb-btn" onclick="dismissNew()">Žymėti kaip peržiūrėta</button></div>'

  if (f === 'all' || f === 'galbut') { if (galbut.length)  html += '<div class="sec-lbl">Galbūt · ' + galbut.length + '</div><div class="grid">' + galbut.map(cardHtml).join('') + '</div>'; }

// ── Character reference photos ─────────────────────────────────────────────
async function addCharRefs(fileList) {
  if (!fileList || !fileList.length) return;
  var basketId = S.activeBasketId;
  if (!basketId) return;
  var btn = document.getElementById('crefAddBtn');
  if (btn) btn.classList.add('cref-add-busy');
  var files = Array.from(fileList).slice(0, 10); // hard cap
  var uploaded = 0, failed = 0;
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    if (!f.type || !/^image\//i.test(f.type)) {
      // try by extension
      if (!/\.(jpe?g|png|webp|gif|heic|heif|bmp)$/i.test(f.name)) { failed++; continue; }
    }
    try {
      var safeName = f.name.replace(/[^a-zA-Z0-9._-]/g, '_').slice(0, 100);
      var path = basketId + '/' + Date.now() + '_' + safeName;
      var contentType = f.type || inferMime(f.name);
      var up = await fetch(SUPABASE_URL + '/storage/v1/object/character-refs/' + path, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': contentType, 'x-upsert': 'true' },
        body: f
      });
      if (!up.ok) { failed++; continue; }
      var ins = await sb('/rest/v1/character_refs', {
        method: 'POST',
        body: JSON.stringify({ basket_id: basketId, storage_path: path, original_filename: f.name, uploaded_by: S.username, position: (S.charRefs[basketId] || []).length + uploaded })
      });
      var row = Array.isArray(ins) ? ins[0] : ins;
      if (!S.charRefs[basketId]) S.charRefs[basketId] = [];
      S.charRefs[basketId].push(row || { id: 'tmp-' + Date.now(), storage_path: path, original_filename: f.name, uploaded_by: S.username, created_at: new Date().toISOString() });
      uploaded++;
    } catch(e) { failed++; }
  }
  // Reset the file input so picking the same files again still triggers change
  var inp = document.getElementById('crefFile'); if (inp) inp.value = '';
  if (btn) btn.classList.remove('cref-add-busy');
  renderGrid();
  if (uploaded) {
    var basket = S.baskets.find(function(b){ return b.id === basketId; });
    showToast(uploaded + (uploaded === 1 ? ' reference pridėta' : ' references pridėtos'));
    // Notification (in-app)
    try {
      await createNotif('new_char_refs', { basketId: basketId, basketName: (basket && basket.name), count: uploaded });
    } catch(e) {}
    // Email (instant for IŠKART users) — pass URLs of just-uploaded refs as preview
    var newRefs = (S.charRefs[basketId] || []).slice(-uploaded);
    var refUrls = newRefs.map(function(r){ return REFS_BASE + r.storage_path; });
    sendNotifEmails('new_char_refs', { basketId: basketId, basketName: (basket && basket.name), count: uploaded, refUrls: refUrls, author: S.username });
  }
  if (failed) showToast('Nepavyko: ' + failed);
}

async function deleteCharRef(refId, storagePath) {
  if (!confirm('Ištrinti šią reference nuotrauką?')) return;
  try {
    // Delete storage file (best effort) and DB row
    try {
      await fetch(SUPABASE_URL + '/storage/v1/object/character-refs/' + storagePath, {
        method: 'DELETE',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      });
    } catch(e) {}
    await sb('/rest/v1/character_refs?id=eq.' + refId, { method: 'DELETE' });
    var arr = S.charRefs[S.activeBasketId] || [];
    S.charRefs[S.activeBasketId] = arr.filter(function(r){ return r.id !== refId; });
    renderGrid();
    showToast('Ištrinta');
  } catch(e) { showToast('Nepavyko ištrinti'); }
}

    // Photos separately
    var actorIds = Array.from(new Set(rows.map(function(r){ return r.actors && r.actors.id; }).filter(Boolean)));

      var photos = await sb('/rest/v1/actor_photos?actor_id=in.(' + actorIds.join(',') + ')&select=actor_id,storage_path,is_primary&order=is_primary.desc');
      photos.forEach(function(p){ if (!pMap[p.actor_id]) pMap[p.actor_id] = []; pMap[p.actor_id].push(p); });

    var html = '<div class="ov-wrap">';

      var ts = type === 'patvirtinti' ? 'yes' : 'maybe';

      html += '<div style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#888780;margin-bottom:12px">' + lbl + ' · Visi veikėjai</div>';
      S.baskets.forEach(function(basket) {
        var filt = rows.filter(function(r){ return r.basket_id === basket.id && r.status === ts; });
        html += '<div class="ov-char-lbl">' + basket.name.toUpperCase() + '</div>';

          html += '<div class="grid-sm">';
          filt.forEach(function(r) {
            var photos = r._photos || [];
            var name = (r.actors && r.actors.first_name) || '?';
            var agId = (r.actors && r.actors.agency_id) || 'x';

            html += '<div class="card" onclick="jumpToActor(\'' + r.id + '\',\'' + basket.id + '\')">' + img + '<div class="card-name">' + esc(name) + '</div></div>';
          });
          html += '</div>';
        } else html += '<div class="ov-empty">' + (type === 'patvirtinti' ? 'Nėra patvirtintų' : 'Nėra') + '</div>';
      });
    } else {
      html += '<div style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#888780;margin-bottom:12px">Veikėjai be patvirtinto aktoriaus</div>';
      var any = false;
      S.baskets.forEach(function(basket) {
        if (rows.filter(function(r){ return r.basket_id === basket.id && r.status === 'yes'; }).length) return;
        any = true;
        var tot = rows.filter(function(r){ return r.basket_id === basket.id; }).length;
        var rev = rows.filter(function(r){ return r.basket_id === basket.id && (r.status === 'yes' || r.status === 'maybe'); }).length;
        html += '<div class="ov-row-txt" onclick="selectBasket(\'' + basket.id + '\')">'
          + '<div class="ov-char">' + basket.name.toUpperCase() + '</div>'
          + '<div class="ov-stat">' + tot + ' kandidatai · ' + rev + ' peržiūrėta</div></div>';
      });
      if (!any) html += '<div style="font-size:13px;color:#888780;padding:20px 0">Visi veikėjai turi patvirtintą aktorių 🎉</div>';
    }
    document.getElementById('mainArea').innerHTML = html + '</div>';
  } catch(e) { document.getElementById('mainArea').innerHTML = '<div class="empty-state">Nepavyko užkrauti<br><small style="font-size:10px;color:#aaa;display:block;margin-top:6px">' + esc(e.message) + '</small></div>'; }
}

function isImageFile(name) {
  if (!name) return false;
  return /\.(jpe?g|png|heic|heif|webp|gif|bmp)$/i.test(name);
}

function commentHtml(c, baId) {
  var d = new Date(c.created_at);
  var t = d.toLocaleDateString('lt-LT', {month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('lt-LT', {hour:'2-digit',minute:'2-digit'});
  var attHtml = '';
  if (c.attachment_path) {
    var attUrl = ATT_BASE + c.attachment_path;
    if (isImageFile(c.attachment_name)) {
      var safeUrl = esc(attUrl).replace(/'/g,"\\'");
      var safeName = esc(c.attachment_name || '');
      attHtml = '<div class="cmt-att-img" id="att-' + c.id + '"><img src="' + esc(attUrl) + '" alt="' + safeName + '" loading="lazy" onclick="openImageViewer(\'' + safeUrl + '\')" onerror="imgAttFallback(\'' + c.id + '\',\'' + safeUrl + '\',\'' + safeName + '\')"></div>';
    } else {

function parseVid(url) {
  var source = 'video', thumbnail = '';
  var yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  if (yt) { source = 'YouTube'; thumbnail = 'https://img.youtube.com/vi/' + yt[1] + '/hqdefault.jpg'; }
  else if (url.indexOf('dropbox.com') !== -1) source = 'Dropbox';
  return { url: url, thumbnail: thumbnail, source: source, added_by: S.username, added_at: new Date().toISOString() };
}
function previewVid(url) {
  var prev = document.getElementById('vidPrev'), thumb = document.getElementById('vidThumb');
  if (!url) { prev.style.display = 'none'; return; }
  var d = parseVid(url);
  if (d.thumbnail) { thumb.src = d.thumbnail; prev.style.display = 'block'; } else prev.style.display = 'none';
}

// ── Comments ───────────────────────────────────────────────────────────────
function inferMime(filename) {
  if (!filename) return 'application/octet-stream';
  var ext = filename.toLowerCase().split('.').pop();
  var map = { jpg:'image/jpeg', jpeg:'image/jpeg', png:'image/png', heic:'image/heic', heif:'image/heif',
              webp:'image/webp', gif:'image/gif', bmp:'image/bmp', pdf:'application/pdf',
              mp4:'video/mp4', mov:'video/quicktime', txt:'text/plain', csv:'text/csv',
              doc:'application/msword', docx:'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
              xls:'application/vnd.ms-excel', xlsx:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' };
  return map[ext] || 'application/octet-stream';
}

var pendingFiles = {};
function setPending(baId, inp) {
  var file = inp.files[0]; if (!file) return;
  pendingFiles[baId] = file;
  var el = document.getElementById('cmtPend-' + baId);
  el.innerHTML = '<div class="cmt-pending"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m16 6-8.414 8.586a2 2 0 0 0 2.829 2.829l8.414-8.586a4 4 0 1 0-5.657-5.657l-8.379 8.551a6 6 0 1 0 8.485 8.485l8.379-8.551"/></svg>'
    + '<span>' + esc(file.name) + '</span><button class="rm" onclick="rmPending(\'' + baId + '\')">✕</button></div>';
}
function rmPending(baId) {
  delete pendingFiles[baId];
  var el = document.getElementById('cmtPend-' + baId); if (el) el.innerHTML = '';
  var fi = document.getElementById('cmtFile-' + baId); if (fi) fi.value = '';
}

async function addCmt(baId) {
  var inp  = document.getElementById('cmtInp-' + baId);
  var text = inp.value.trim();
  var file = pendingFiles[baId];
  if (!text && !file) return;
  var sendBtn = inp.closest('.cmt-compose').querySelector('.cmt-send');
  sendBtn.disabled = true;
  var att_path = null, att_name = null;
  if (file) {
    try {
      var path = baId + '/' + Date.now() + '_' + file.name;
      var contentType = file.type || inferMime(file.name);
      var up = await fetch(SUPABASE_URL + '/storage/v1/object/attachments/' + path, {
        method: 'POST', headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': contentType }, body: file });
      if (up.ok) { att_path = path; att_name = file.name; }
    } catch(e) { showToast('Priedo įkelti nepavyko'); }
  }
  try {
    var payload = { basket_actor_id: baId, author_name: S.username, content: text || (att_name ? '📎 ' + att_name : ''), attachment_path: att_path, attachment_name: att_name };
    var inserted;
    try { inserted = await sb('/rest/v1/comments', { method: 'POST', body: JSON.stringify(payload) }); }
    catch(e) { inserted = await sb('/rest/v1/comments', { method: 'POST', body: JSON.stringify({ basket_actor_id: baId, author_name: S.username, content: payload.content }) }); }
    var newRow = Array.isArray(inserted) ? inserted[0] : inserted;
    var c = newRow && newRow.id ? newRow : Object.assign({ id: 'tmp-' + Date.now(), created_at: new Date().toISOString() }, payload);
    var list = document.getElementById('cmtList-' + baId);
    var wrapper = document.createElement('div');
    wrapper.innerHTML = commentHtml(c, baId);
    var node = wrapper.firstChild;
    list.appendChild(node);
    node.scrollIntoView({ behavior: 'smooth' });
    inp.value = ''; rmPending(baId);
    var ba = S.basketActors.find(function(a){ return a.basket_actor_id === baId; });
    if (ba) ba.comment_count = (ba.comment_count || 0) + 1;
    var basket = S.baskets.find(function(b){ return b.id === S.activeBasketId; });
    await createNotif('new_comment', { baId: baId, basketId: S.activeBasketId, actorName: (ba && ba.actor && ba.actor.first_name), basketName: (basket && basket.name) });
    sendNotifEmails('new_comment', { baId: baId, actorName: (ba && ba.actor && ba.actor.first_name), agencyId: (ba && ba.actor && ba.actor.agency_id), basketName: (basket && basket.name), message: text, author: S.username });
  } catch(e) { showToast('Nepavyko išsiųsti'); }
  sendBtn.disabled = false;
}

function openGallery(idx) {

function updateGal() {
  var len = S.galPhotos.length;
  document.getElementById('galImg').src = S.galPhotos[S.galIdx] || '';
  document.getElementById('galCtr').textContent = (S.galIdx + 1) + ' / ' + len;
  document.querySelector('.gal-prev').style.display = len > 1 ? 'flex' : 'none';
  document.querySelector('.gal-next').style.display = len > 1 ? 'flex' : 'none';
}
function galNav(d) { S.galIdx = (S.galIdx + d + S.galPhotos.length) % S.galPhotos.length; updateGal(); }
function closeGallery() { document.getElementById('gallery').style.display = 'none'; document.removeEventListener('keydown', galKey); }
function galKey(e) {
  if (e.key === 'ArrowLeft') galNav(-1);
  else if (e.key === 'ArrowRight') galNav(1);
  else if (e.key === 'Escape') closeGallery();
}

var ADMIN_HASH_CONST = 'e1f72e6cf1bc3c62ca7577066fd27bf5439bb0de6b9184a062687296cc50b363';

function openAdminLogin() {
  document.getElementById('adminPsw').value = '';
  document.getElementById('adminErr').style.display = 'none';

  setTimeout(function(){ document.getElementById('adminPsw').focus(); }, 100);
}

async function checkAdminLogin() {
  var psw = document.getElementById('adminPsw').value;
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(psw));
  var hash = Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
  if (hash !== ADMIN_HASH_CONST) {
    document.getElementById('adminErr').style.display = 'block'; return;
  }
  closeAdminLogin();
  openAdminPanel();
}

function _emailPhotoStrip(urls) {

  var cells = urls.slice(0, 3).map(function(u) {
    return '<td style="padding:0 4px 0 0;width:33%;">'
      + '<img src="' + esc(u) + '" width="180" style="width:100%;max-width:180px;height:120px;object-fit:cover;border-radius:6px;display:block;" />'
      + '</td>';
  }).join('');
  return '<table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:16px;"><tr>' + cells + '</tr></table>';
}

// Info grid (label/value rows)
function _emailInfoGrid(rows) {
  if (!rows || !rows.length) return '';
  var html = '<table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #dce6db;border-radius:8px;border-collapse:collapse;overflow:hidden;margin-bottom:20px;">';
  rows.forEach(function(r) {
    html += '<tr>'
      + '<td style="padding:8px 12px;font-size:11px;color:#888;border-bottom:1px solid #e8ede7;width:38%;white-space:nowrap;">' + esc(r[0]) + '</td>'
      + '<td style="padding:8px 12px;font-size:13px;color:#1a1a18;border-bottom:1px solid #e8ede7;">' + r[1] + '</td>'
      + '</tr>';
  });
  html += '</table>';
  return html;
}

// Status pill change: old → new
function _emailStatusPill(oldStatus, newStatus) {
  var statusLbl = function(s) {
    if (s === 'yes') return 'Taip';
    if (s === 'maybe') return 'Galbūt';
    if (s === 'pending' || !s) return 'Neperžiūrėta';
    return s;
  };
  return '<table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #dce6db;border-radius:8px;border-collapse:collapse;overflow:hidden;margin-bottom:20px;">'
    + '<tr>'
      + '<td style="padding:8px 12px;font-size:11px;color:#888;border-bottom:1px solid #e8ede7;width:38%;">Pakeista</td>'
      + '<td style="padding:8px 12px;font-size:13px;color:#1a1a18;border-bottom:1px solid #e8ede7;">'
        + '<span style="background:#FCEBEB;color:#791F1F;padding:2px 8px;border-radius:4px;font-size:12px;">' + esc(statusLbl(oldStatus)) + '</span>'
        + ' &rarr; '
        + '<span style="background:#EAF3DE;color:#27500A;padding:2px 8px;border-radius:4px;font-size:12px;">' + esc(statusLbl(newStatus)) + '</span>'
      + '</td>'
    + '</tr>'
  + '</table>';
}

// Comment quote block
function _emailCommentBlock(author, message) {
  if (!message) return '';
  return '<div style="background:#f5f8f5;border-left:3px solid #534AB7;border-radius:0 6px 6px 0;padding:12px 14px;margin-bottom:16px;">'
    + '<div style="font-size:11px;color:#888;margin-bottom:6px;">' + esc(author || '') + ' rašo:</div>'
    + '<div style="font-size:13px;color:#1a1a18;line-height:1.6;">' + esc(message) + '</div>'
  + '</div>';
}

// Fetch first 3 actor photos for an actor (helper for emails). Falls back to []
async function _fetchActorPhotosForEmail(baId) {
  try {
    var rows = await sb('/rest/v1/basket_actors?id=eq.' + baId + '&select=actor_id');
    if (!rows.length) return [];
    var actorId = rows[0].actor_id;
    if (!actorId) return [];
    var ph = await sb('/rest/v1/actor_photos?actor_id=eq.' + actorId + '&select=storage_path,is_primary&order=is_primary.desc&limit=3');
    return ph.map(function(p){ return PHOTO_BASE + p.storage_path; });
  } catch(e) { return []; }
}

async function sendNotifEmails(type, data) {
  try {
    var users = await sb('/rest/v1/app_users?select=name,email,pref_actors,pref_comments,pref_info,pref_videos,pref_status,frequency');
    if (!users || !users.length) return;
    var prefMap = {
      new_comment:      'pref_comments',
      status_change:    'pref_status',
      info_update:      'pref_info',
      new_video:        'pref_videos',
      new_actors_batch: 'pref_actors',
      new_char_refs:    'pref_actors' // share pref_actors flag for now (no separate column yet)
    };
    var prefKey = prefMap[type]; if (!prefKey) return;

    // Fetch actor photos once if we have a baId
    var photoUrls = [];
    if (data.baId) photoUrls = await _fetchActorPhotosForEmail(data.baId);
    if (type === 'new_char_refs' && data.refUrls && data.refUrls.length) photoUrls = data.refUrls.slice(0, 3);

    var actorName = data.actorName || '';
    var basketName = data.basketName || '';
    var agencyId = data.agencyId || '';
    var APP_URL = 'https://vaivamartisauskaite.github.io/SVpreptools/';

    // Subject lines (mirror LocScout: "Sugauti Vanagą LOC // {title}")
    var titleByType = {
      new_comment:      'Naujas komentaras — ' + actorName,
      status_change:    'Statusas pakeistas — ' + actorName,
      info_update:      'Atnaujinta informacija — ' + actorName,
      new_video:        'Naujas video — ' + actorName,
      new_actors_batch: 'Pridėti ' + (data.count || '') + ' nauji kandidatai',
      new_char_refs:    'Pridėtos references — ' + basketName
    };
    var titleText = titleByType[type] || type;
    var subject = 'Sugauti Vanagą CAST // ' + titleText;

    // Body content per type
    var content = '';
    if (type === 'new_comment') {
      content += _emailPhotoStrip(photoUrls);
      var rows = [];
      if (basketName) rows.push(['Veikėjas', '<strong>' + esc(basketName) + '</strong>']);
      if (agencyId) rows.push(['Aktoriaus ID', esc(agencyId)]);
      content += _emailInfoGrid(rows);
      content += _emailCommentBlock(data.author || '', data.message || '');
    } else if (type === 'status_change') {
      content += _emailPhotoStrip(photoUrls);
      var rows2 = [];
      if (basketName) rows2.push(['Veikėjas', '<strong>' + esc(basketName) + '</strong>']);
      if (agencyId) rows2.push(['Aktoriaus ID', esc(agencyId)]);
      if (data.changedBy) rows2.push(['Pakeitė', esc(data.changedBy)]);
      content += _emailInfoGrid(rows2);
      content += _emailStatusPill(data.oldStatus || 'pending', data.newStatus || '');
    } else if (type === 'info_update') {
      content += _emailPhotoStrip(photoUrls);
      var rows3 = [];
      if (basketName) rows3.push(['Veikėjas', '<strong>' + esc(basketName) + '</strong>']);
      if (agencyId) rows3.push(['Aktoriaus ID', esc(agencyId)]);
      if (data.changedBy) rows3.push(['Atnaujino', esc(data.changedBy)]);
      content += _emailInfoGrid(rows3);
    } else if (type === 'new_video') {
      content += _emailPhotoStrip(photoUrls);
      var rows4 = [];
      if (basketName) rows4.push(['Veikėjas', '<strong>' + esc(basketName) + '</strong>']);
      if (agencyId) rows4.push(['Aktoriaus ID', esc(agencyId)]);
      if (data.changedBy) rows4.push(['Pridėjo', esc(data.changedBy)]);
      content += _emailInfoGrid(rows4);
      content += '<p style="font-size:13px;color:#1a1a18;margin:0 0 16px;">Pridėtas naujas video — peržiūrėkite CastApp\'e.</p>';
    } else if (type === 'new_char_refs') {
      content += _emailPhotoStrip(photoUrls);
      var rows5 = [];
      if (basketName) rows5.push(['Veikėjas', '<strong>' + esc(basketName) + '</strong>']);
      rows5.push(['Pridėta', '<strong>' + (data.count || 1) + '</strong> reference' + ((data.count || 1) === 1 ? '' : 's')]);
      if (data.author) rows5.push(['Pridėjo', esc(data.author)]);
      content += _emailInfoGrid(rows5);
    } else if (type === 'new_actors_batch') {
      content += '<p style="font-size:13px;color:#1a1a18;margin:0 0 16px;">Pridėti <strong>' + (data.count || '') + '</strong> nauji kandidatai.</p>';
    } else {
      content += '<p style="font-size:13px;color:#1a1a18;">' + esc(titleText) + '</p>';
    }

    var bodyHtml = _emailWrap(titleText, content, APP_URL, 'Peržiūrėti CastApp');

    for (var i = 0; i < users.length; i++) {
      var u = users[i];
      if (!u.email) continue;
      if (u.name === S.username) continue;        // don't email self
      if (!u[prefKey]) continue;                   // user disabled this notif type
      if (u.frequency === 'kasdien') continue;     // digest user — handled separately
      try {
        await fetch(EMAIL_FN_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ from: RESEND_FROM, to: [u.email], subject: subject, html: bodyHtml })
        });
      } catch(e) {}
    }
  } catch(e) {}
}

// ── Sidebar mobile ─────────────────────────────────────────────────────────
function toggleSidebar() {
  var sb = document.getElementById('sidebar'), ov = document.getElementById('sbOverlay');
  var open = sb.classList.contains('sb-open');
  sb.classList.toggle('sb-open', !open); ov.classList.toggle('vis', !open);
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('sb-open');
  document.getElementById('sbOverlay').classList.remove('vis');
}

// ── Realtime polling ───────────────────────────────────────────────────────
function startRealtime() {
  setInterval(async function() {
    if (!S.selectedBaId) return;
    try {
      var cmts = await sb('/rest/v1/comments?basket_actor_id=eq.' + S.selectedBaId + '&select=id&order=created_at.asc');
      var list = document.getElementById('cmtList-' + S.selectedBaId);
      if (!list) return;
      var curr = list.querySelectorAll('.cmt-item').length;
      if (cmts.length > curr) {
        var ba = S.basketActors.find(function(a){ return a.basket_actor_id === S.selectedBaId; });
        if (ba) { ba.comment_count = cmts.length; openActor(S.selectedBaId); }
      }
    } catch(e) {}
    if (S.projectId) updateBadges();
  }, 30000);
}

// ── Utils ──────────────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hsl(s) {
  var h = 0;
  for (var i = 0; i < s.length; i++) h = s.charCodeAt(i) + ((h << 5) - h);
  return 'hsl(' + (h % 360) + ',30%,30%)';
}
function timeAgo(ds) {
  if (!ds) return '';
  var m = Math.floor((Date.now() - new Date(ds)) / 60000);
  if (m < 1)  return 'ką tik';
  if (m < 60) return 'prieš ' + m + ' min';
  var h = Math.floor(m / 60);
  if (h < 24) return 'prieš ' + h + ' val';
  var d = Math.floor(h / 24);
  if (d < 7)  return 'prieš ' + d + ' d';
  return new Date(ds).toLocaleDateString('lt-LT', {month:'short',day:'numeric'});
}
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._to); t._to = setTimeout(function(){ t.classList.remove('show'); }, 2400);
}
